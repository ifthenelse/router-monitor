name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump to apply before building."
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      release_name:
        description: "Release title. Leave empty to use the generated tag."
        required: false
        type: string
      draft:
        description: "Create the release as a draft."
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  BINARY_NAME: router-monitor
  CARGO_TERM_COLOR: always

jobs:
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.commit.outputs.release_sha }}
      release_version: ${{ steps.bump.outputs.release_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Calculate next version
        id: bump
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          if [ "$GITHUB_REF_TYPE" != "branch" ]; then
            echo "Run this workflow from a branch so it can commit the version bump."
            exit 1
          fi

          current_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"

          if ! [[ "$current_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Cargo.toml version '${current_version}' is not a plain semantic version."
            exit 1
          fi

          IFS=. read -r major minor patch <<< "$current_version"

          case "$VERSION_BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported version bump '${VERSION_BUMP}'."
              exit 1
              ;;
          esac

          release_version="${major}.${minor}.${patch}"
          tag_name="v${release_version}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag '${tag_name}' already exists."
            exit 1
          fi

          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo package version
        env:
          RELEASE_VERSION: ${{ steps.bump.outputs.release_version }}
        run: |
          perl -0pi -e 's/(\[package\]\s+name = "router-monitor"\s+version = ")[^"]+(")/$1$ENV{RELEASE_VERSION}$2/s' Cargo.toml
          cargo check

      - name: Commit version bump
        id: commit
        run: |
          if git diff --quiet -- Cargo.toml Cargo.lock; then
            echo "No version changes were produced."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Version number bump"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-macos-universal:
    name: Build macOS universal
    runs-on: macos-latest
    needs: bump-version

    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.release_sha }}

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build Apple Silicon binary
        run: cargo build --locked --release --target aarch64-apple-darwin

      - name: Build Intel macOS binary
        run: cargo build --locked --release --target x86_64-apple-darwin

      - name: Create universal macOS executable
        run: |
          mkdir -p dist/package
          lipo -create \
            -output "dist/package/${BINARY_NAME}" \
            "target/aarch64-apple-darwin/release/${BINARY_NAME}" \
            "target/x86_64-apple-darwin/release/${BINARY_NAME}"
          chmod +x "dist/package/${BINARY_NAME}"
          tar -czf "dist/${BINARY_NAME}-macos-universal.tar.gz" -C dist/package "${BINARY_NAME}"
          shasum -a 256 "dist/${BINARY_NAME}-macos-universal.tar.gz" > "dist/${BINARY_NAME}-macos-universal.tar.gz.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            dist/router-monitor-macos-universal.tar.gz
            dist/router-monitor-macos-universal.tar.gz.sha256
          if-no-files-found: error

  build-linux-musl:
    name: Build Linux x86_64 musl
    runs-on: ubuntu-latest
    needs: bump-version

    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.release_sha }}

      - name: Install musl build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build static Linux executable
        run: cargo build --locked --release --target x86_64-unknown-linux-musl

      - name: Package Linux executable
        run: |
          mkdir -p dist/package
          cp "target/x86_64-unknown-linux-musl/release/${BINARY_NAME}" "dist/package/${BINARY_NAME}"
          chmod +x "dist/package/${BINARY_NAME}"
          tar -czf "dist/${BINARY_NAME}-x86_64-unknown-linux-musl.tar.gz" -C dist/package "${BINARY_NAME}"
          sha256sum "dist/${BINARY_NAME}-x86_64-unknown-linux-musl.tar.gz" > "dist/${BINARY_NAME}-x86_64-unknown-linux-musl.tar.gz.sha256"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-musl
          path: |
            dist/router-monitor-x86_64-unknown-linux-musl.tar.gz
            dist/router-monitor-x86_64-unknown-linux-musl.tar.gz.sha256
          if-no-files-found: error

  create-release:
    name: Create tag and GitHub Release
    runs-on: ubuntu-latest
    needs:
      - bump-version
      - build-macos-universal
      - build-linux-musl

    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.release_sha }}
          fetch-depth: 0

      - name: Download packaged executables
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create git tag
        env:
          RELEASE_SHA: ${{ needs.bump-version.outputs.release_sha }}
          TAG_NAME: ${{ needs.bump-version.outputs.tag_name }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag '${TAG_NAME}' already exists."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG_NAME}" "${RELEASE_SHA}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Create release notes
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ needs.bump-version.outputs.tag_name }}
        run: |
          cat > release-notes.md <<EOF
          ## Downloads

          - [macOS universal executable](https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/router-monitor-macos-universal.tar.gz)
          - [macOS universal SHA-256](https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/router-monitor-macos-universal.tar.gz.sha256)
          - [Linux x86_64 musl executable](https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/router-monitor-x86_64-unknown-linux-musl.tar.gz)
          - [Linux x86_64 musl SHA-256](https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/router-monitor-x86_64-unknown-linux-musl.tar.gz.sha256)

          Each archive contains a terminal executable named \`router-monitor\`.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_NAME: ${{ inputs.release_name }}
          TAG_NAME: ${{ needs.bump-version.outputs.tag_name }}
        run: |
          title="${RELEASE_NAME:-$TAG_NAME}"
          args=(
            "$TAG_NAME"
            dist/*
            --repo "$GITHUB_REPOSITORY"
            --title "$title"
            --notes-file release-notes.md
          )

          if [ "$DRAFT" = "true" ]; then
            args+=(--draft)
          fi

          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
