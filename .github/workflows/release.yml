name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to create for this release, for example v1.0.0"
        required: true
        type: string
      release_name:
        description: "Release title. Leave empty to use the tag name."
        required: false
        type: string
      draft:
        description: "Create the release as a draft."
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  BINARY_NAME: router-monitor

jobs:
  build-macos-universal:
    name: Build macOS universal
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build Apple Silicon binary
        run: cargo build --locked --release --target aarch64-apple-darwin

      - name: Build Intel macOS binary
        run: cargo build --locked --release --target x86_64-apple-darwin

      - name: Create universal macOS executable
        run: |
          mkdir -p dist/package
          lipo -create \
            -output "dist/package/${BINARY_NAME}" \
            "target/aarch64-apple-darwin/release/${BINARY_NAME}" \
            "target/x86_64-apple-darwin/release/${BINARY_NAME}"
          chmod +x "dist/package/${BINARY_NAME}"
          tar -czf "dist/${BINARY_NAME}-macos-universal.tar.gz" -C dist/package "${BINARY_NAME}"
          shasum -a 256 "dist/${BINARY_NAME}-macos-universal.tar.gz" > "dist/${BINARY_NAME}-macos-universal.tar.gz.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            dist/router-monitor-macos-universal.tar.gz
            dist/router-monitor-macos-universal.tar.gz.sha256
          if-no-files-found: error

  build-linux-musl:
    name: Build Linux x86_64 musl
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install musl build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build static Linux executable
        run: cargo build --locked --release --target x86_64-unknown-linux-musl

      - name: Package Linux executable
        run: |
          mkdir -p dist/package
          cp "target/x86_64-unknown-linux-musl/release/${BINARY_NAME}" "dist/package/${BINARY_NAME}"
          chmod +x "dist/package/${BINARY_NAME}"
          tar -czf "dist/${BINARY_NAME}-x86_64-unknown-linux-musl.tar.gz" -C dist/package "${BINARY_NAME}"
          sha256sum "dist/${BINARY_NAME}-x86_64-unknown-linux-musl.tar.gz" > "dist/${BINARY_NAME}-x86_64-unknown-linux-musl.tar.gz.sha256"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-musl
          path: |
            dist/router-monitor-x86_64-unknown-linux-musl.tar.gz
            dist/router-monitor-x86_64-unknown-linux-musl.tar.gz.sha256
          if-no-files-found: error

  create-release:
    name: Create tag and GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos-universal
      - build-linux-musl

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged executables
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create git tag
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if [ -z "${TAG_NAME}" ]; then
            echo "A tag name is required."
            exit 1
          fi

          if ! git check-ref-format "refs/tags/${TAG_NAME}"; then
            echo "Tag '${TAG_NAME}' is not a valid git tag name."
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Tag '${TAG_NAME}' already exists."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG_NAME}" "${GITHUB_SHA}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Create release notes
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          cat > release-notes.md <<EOF
          ## Downloads

          - [macOS universal executable](https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/router-monitor-macos-universal.tar.gz)
          - [macOS universal SHA-256](https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/router-monitor-macos-universal.tar.gz.sha256)
          - [Linux x86_64 musl executable](https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/router-monitor-x86_64-unknown-linux-musl.tar.gz)
          - [Linux x86_64 musl SHA-256](https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/router-monitor-x86_64-unknown-linux-musl.tar.gz.sha256)

          Each archive contains a terminal executable named \`router-monitor\`.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_NAME: ${{ inputs.release_name }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          title="${RELEASE_NAME:-$TAG_NAME}"
          args=(
            "$TAG_NAME"
            dist/*
            --repo "$GITHUB_REPOSITORY"
            --title "$title"
            --notes-file release-notes.md
          )

          if [ "$DRAFT" = "true" ]; then
            args+=(--draft)
          fi

          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
